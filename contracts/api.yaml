          type: string
          enum: [v1]

    WorkflowRunRequestBody:
      type: object
      description: |
        Optional catalog selector. Omit or use `{}` to enqueue the bundled demo workflow.
        Pass ``workflowId`` with the catalog key returned by the dashboard (definition id or ``db-{prismaWorkflowId}``).
      additionalProperties: false
      properties:
        workflowId:
          type: string
          description: Catalog workflow identifier (bundled DAG id or ``db-*`` persisted row).
        context:
          type: object
          description: |
            Optional arbitrary JSON merged into ``workflow_run.context``. The platform merges dashboard-triggered runs under ``source: "dashboard-run"`` together with this object (later keys from this payload overlay defaults unless callers intentionally overwrite nested fields).
          additionalProperties: true

    WorkflowCloneRequest:
      type: object
      required: [catalogItemId]
      additionalProperties: false
      properties:
        catalogItemId:
          type: string
          description: Bundled definition id or ``db-{workflowRowId}`` to duplicate into a new owned workflow row.

    WorkflowCloneResponse:
      type: object
      required: [catalogItemId, workflowRowId, definitionId, name]
      properties:
        catalogItemId:
          type: string
          description: Dashboard catalog key for the clone (always ``db-{workflowRowId}``).
        workflowRowId:
          type: string
        definitionId:
          type: string
          description: New DAG ``id`` embedded in the cloned definition JSON.
        name:
          type: string

    RunStreamEvent:
      type: object
      description: |
        Mandatory JSON shape for every SSE ``data`` line on ``GET /api/runs/{id}/stream``.
        Do not emit ad-hoc root JSON objects on this route.
      required:
        - type
        - data
      properties:
        type:
          type: string
          description: |
            Standard lifecycle values: ``run.started``, ``run.progress``, ``run.completed``, ``run.failed``.
            Streams may emit ``log.entry``, ``task.update``, or ``stream.error``.
        data:
          type: object
          additionalProperties: true

    WorkflowRunAccepted:
      type: object
      required:
        - runId
        - workflowId
        - workflowDefinitionSnapshotId
        - definitionHash
        - taskRuns
        - executionMode
        - message
      properties:
        runId:
          type: string
        workflowId:
          type: string
        catalogItemId:
          type: string
          description: Catalog key recorded on the run metadata for UI deep links.
        workflowDefinitionSnapshotId:
          type: string
        definitionHash:
          type: string
        taskRuns:
          type: integer
        executionMode:
          type: string
          enum: [queued, inline]
        message:
          type: string

    WorkflowNotFound:
      type: object
      required: [error, reason, workflowId]
      properties:
        error:
          type: string
          enum: [Workflow not found]
        reason:
          type: string
          enum: [not_found, invalid_definition]
        workflowId:
          type: string
          description: Catalog key supplied by the client (or defaulted bundled demo id).

    WorkflowValidationError:
      type: object
      required: [error]
      properties:
        error:
          type: string
          enum: [Workflow validation failed]
        code:
          type: string
          description: Stable machine-readable validation classification when provided.
        message:
          type: string
          description: Human-readable summary when provided (defaults to ``error`` when omitted).
        details:
          type: object
          additionalProperties: true
          description: Structured validation diagnostics (graph errors, field paths, etc.).

    WorkflowEngineUnavailable:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
          enum: [Execution engine unavailable]
        reason:
          type: string
          enum: [worker_queue_required]
        message:
          type: string
