openapi: "3.1.0"
info:
  title: Cascades API
  description: |
    Workflow execution and automation engine for the Noir Stack platform.
    Supports OSINT intake pipelines, DAG-based workflow execution, evidence
    verification, cron scheduling, role-based access control, and more.
  version: "2.3.0"
  contact:
    name: Noir Stack Platform Team
    url: https://cascades.work/docs

servers:
  - url: https://cascades.work
    description: Production

security:
  - BearerAuth: []
  - SessionCookieAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    SessionCookieAuth:
      type: apiKey
      in: cookie
      name: __session
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  schemas:
    Workflow:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string }
        version: { type: string }
        collectors: { type: array, items: { type: string } }
        schedule: { type: string, nullable: true }
        inputs: { type: object }
        status: { type: string }
        created_at: { type: string, format: date-time }

    Execution:
      type: object
      properties:
        id: { type: string }
        workflow_id: { type: string }
        status: { type: string, enum: [pending, running, completed, failed, cancelled] }
        started_at: { type: string, format: date-time }
        completed_at: { type: string, format: date-time, nullable: true }
        inputs: { type: object }
        outputs: { type: object }
        steps: { type: array, items: { type: object } }
        error: { type: string }

    OsintIntakeRequest:
      type: object
      required: [connectors]
      properties:
        investigationId: { type: string, description: "Judicium investigation ID" }
        connectors:
          type: array
          items:
            type: object
            properties:
              sourceTool: { type: string, enum: [spiderfoot, maltego, shodan, censys, urlscan, virustotal, whois, github, api, database] }
              baseUrl: { type: string }
              apiKey: { type: string }
              filePath: { type: string }
              fileFormat: { type: string, enum: [csv, mtz, xlsx] }
        deduplicate: { type: boolean, default: true }
        autoSubmit: { type: boolean, default: true }

    OsintIntakeResult:
      type: object
      properties:
        executionId: { type: string }
        totalCollected: { type: integer }
        newFindings: { type: integer }
        duplicatesSkipped: { type: integer }
        submittedToJudicium: { type: integer }
        errors: { type: array, items: { type: string } }

    DagDefinition:
      type: object
      properties:
        nodes:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              type: { type: string }
              data: { type: object }
        edges:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              source: { type: string }
              target: { type: string }

    RunResult:
      type: object
      properties:
        runId: { type: string }
        status: { type: string }
        executionMode: { type: string }
        nodeResults: { type: object }
        nodeStatuses: { type: object }
        startedAt: { type: string, format: date-time }
        completedAt: { type: string, format: date-time }
        error: { type: string }

    Trigger:
      type: object
      properties:
        id: { type: string }
        workflowId: { type: string }
        schedule: { type: string }
        enabled: { type: boolean }
        lastRun: { type: string, format: date-time }
        nextRun: { type: string, format: date-time }
        inputs: { type: object }

    ApiKey:
      type: object
      properties:
        id: { type: string }
        key: { type: string }
        name: { type: string }
        permissions: { type: array, items: { type: object } }
        createdAt: { type: string, format: date-time }
        expiresAt: { type: string, format: date-time }

    HealthStatus:
      type: object
      properties:
        status: { type: string, enum: [healthy, degraded, unhealthy] }
        circuitBreakers: { type: object }
        deadLetterQueue: { type: object }
        uptime: { type: number }
        timestamp: { type: string, format: date-time }

paths:
  /api/v1/workflows:
    get:
      operationId: listWorkflows
      summary: List all workflows
      tags: [Workflows]
      security: [{BearerAuth: [cascades:workflows:read]}]
      responses:
        "200":
          description: List of workflow definitions
          content:
            application/json:
              schema:
                type: object
                properties:
                  workflows: { type: array, items: { $ref: "#/components/schemas/Workflow" } }
    post:
      operationId: createWorkflow
      summary: Create a new workflow
      tags: [Workflows]
      security: [{BearerAuth: [cascades:workflows:write]}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Workflow"
      responses:
        "201":
          description: Workflow created

  /api/v1/workflows/{id}/execute:
    post:
      operationId: executeWorkflow
      summary: Execute a workflow
      tags: [Workflows]
      security: [{BearerAuth: [cascades:workflows:execute]}]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "202":
          description: Workflow execution started

  /api/v1/workflows/{id}/run:
    post:
      operationId: runNamedWorkflow
      summary: Run a named workflow (investigation, evidence-verification, etc.)
      tags: [Workflows]
      security: [{BearerAuth: [cascades:workflows:execute]}]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Workflow execution result

  /api/v1/executions/{id}:
    get:
      operationId: getExecution
      summary: Get execution status and results
      tags: [Executions]
      security: [{BearerAuth: [cascades:executions:read]}]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Execution details

  /api/v1/executions/{id}/cancel:
    post:
      operationId: cancelExecution
      summary: Cancel a running execution
      tags: [Executions]
      security: [{BearerAuth: [cascades:executions:write]}]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Execution cancelled

  /api/v1/executions/{id}/complete:
    post:
      operationId: completeExecution
      summary: Mark an execution as complete
      tags: [Executions]
      security: [{BearerAuth: [cascades:executions:write]}]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Execution completed

  /api/v1/automation/trigger:
    post:
      operationId: triggerAutomation
      summary: Trigger an automation workflow
      tags: [Automation]
      security: [{BearerAuth: [cascades:automation:trigger]}]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                workflow_id: { type: string }
                inputs: { type: object }
      responses:
        "202":
          description: Automation triggered

  /api/v1/osint/intake:
    post:
      operationId: runOsintIntake
      summary: Execute OSINT intake pipeline
      description: Poll configured OSINT connectors, normalize findings, deduplicate, and submit to Judicium
      tags: [OSINT]
      security: [{BearerAuth: [cascades:workflows:execute]}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OsintIntakeRequest"
      responses:
        "202":
          description: OSINT intake result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OsintIntakeResult"

  /api/v1/osint/intake/{id}:
    get:
      operationId: getOsintIntakeResult
      summary: Get OSINT intake execution result
      tags: [OSINT]
      security: [{BearerAuth: [cascades:executions:read]}]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Intake result

  /api/v1/osint/connectors:
    get:
      operationId: listConnectors
      summary: List registered OSINT connectors
      tags: [OSINT]
      security: [{BearerAuth: [cascades:workflows:read]}]
      responses:
        "200":
          description: List of connectors

  /api/v1/osint/connectors/{source}/validate:
    post:
      operationId: validateConnector
      summary: Validate an OSINT connector configuration
      tags: [OSINT]
      security: [{BearerAuth: [cascades:workflows:read]}]
      parameters:
        - name: source
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Validation result

  /api/v1/triggers:
    get:
      operationId: listTriggers
      summary: List scheduled triggers
      tags: [Triggers]
      security: [{BearerAuth: [cascades:triggers:manage]}]
      responses:
        "200":
          description: List of triggers
    post:
      operationId: createTrigger
      summary: Create a scheduled trigger
      tags: [Triggers]
      security: [{BearerAuth: [cascades:triggers:manage]}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [workflowId, schedule]
              properties:
                workflowId: { type: string }
                schedule: { type: string, description: "cron expression (5 fields)" }
                inputs: { type: object }
      responses:
        "201":
          description: Trigger created
    delete:
      operationId: deleteTrigger
      summary: Delete a scheduled trigger
      tags: [Triggers]
      security: [{BearerAuth: [cascades:triggers:manage]}]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Trigger deleted

  /api/workflows/run:
    post:
      operationId: submitDagRun
      summary: Submit a DAG workflow for execution
      description: Matches the cascades-sdk contract. Accepts a DAG definition or references a catalog workflow.
      tags: [DAG]
      security: [{SessionCookieAuth: []}]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                workflowId: { type: string }
                dag: { $ref: "#/components/schemas/DagDefinition" }
                context: { type: object }
                executionMode: { type: string, enum: [inline, queued] }
      responses:
        "202":
          description: DAG run accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  runId: { type: string }
                  status: { type: string }
                  executionMode: { type: string }

  /api/runs/{id}:
    get:
      operationId: getRunResult
      summary: Get DAG run result
      tags: [DAG]
      security: [{SessionCookieAuth: []}]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Run result with per-node statuses and outputs

  /api/runs/{id}/stream:
    get:
      operationId: streamRunEvents
      summary: Stream DAG run events via SSE
      tags: [DAG]
      security: [{SessionCookieAuth: []}]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: SSE event stream
          content:
            text/event-stream:
              schema:
                type: string

  /api/v1/keys:
    get:
      operationId: listApiKeys
      summary: List API keys
      tags: [Keys]
      security: [{BearerAuth: [platform:audit:write]}]
      responses:
        "200":
          description: List of API keys
    post:
      operationId: createApiKey
      summary: Create a new API key
      tags: [Keys]
      security: [{BearerAuth: [platform:audit:write]}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                permissions: { type: array, items: { type: object } }
                expiresInMs: { type: integer }
      responses:
        "201":
          description: API key created

  /api/v1/keys/{id}:
    delete:
      operationId: deleteApiKey
      summary: Delete an API key
      tags: [Keys]
      security: [{BearerAuth: [platform:audit:write]}]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: API key deleted

  /api/v1/keys/{id}/rotate:
    post:
      operationId: rotateApiKey
      summary: Rotate an API key (generate new key, keep same id)
      tags: [Keys]
      security: [{BearerAuth: [platform:audit:write]}]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Key rotated

  /api/v1/webhooks/github:
    post:
      operationId: handleGithubWebhook
      summary: Receive GitHub webhook with signature verification
      tags: [Webhooks]
      security: []
      responses:
        "200":
          description: Webhook received

  /api/v1/webhooks/generic:
    post:
      operationId: handleGenericWebhook
      summary: Receive generic webhook with HMAC verification
      tags: [Webhooks]
      security: []
      responses:
        "200":
          description: Webhook received

  /api/v1/system/health:
    get:
      operationId: getSystemHealth
      summary: Get system health status with circuit breaker and DLQ stats
      tags: [System]
      security: []
      responses:
        "200":
          description: Health status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /:
    get:
      operationId: getLandingPage
      summary: Landing page
      tags: [UI]
      security: []
      responses:
        "200":
          description: HTML landing page

  /builder:
    get:
      operationId: getWorkflowBuilder
      summary: Visual workflow builder
      tags: [UI]
      security: []
      responses:
        "200":
          description: HTML workflow builder

  /dashboard:
    get:
      operationId: getDashboard
      summary: Console dashboard
      tags: [UI]
      security: []
      responses:
        "200":
          description: HTML dashboard
