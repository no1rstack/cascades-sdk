# THIS FILE IS THE SOURCE OF TRUTH FOR SDK ↔ PLATFORM INTERFACE
openapi: 3.0.3
info:
  title: Cascades SDK ↔ Platform HTTP boundary
  version: "1.0.0" # sync: cascades-sdk `src/cascades_sdk/_meta.py` → `API_CONTRACT_VERSION`
  description: |
    Canonical surfaces the Cascades Next.js platform exposes for workflow submission,
    live status, and execution logs. This document is the shared contract between the
    **cascades-sdk** on PyPI (`import cascades_sdk`; source https://github.com/no1rstack/cascades-sdk) and the Cascades platform repository.

    **Authentication:** Production deployments authenticate callers using Auth0-backed **session cookies**
    (`cookieSession` in this contract). Use the SDK's ``SessionCookieAuth`` or ``CookieHeaderAuth`` (see ``cascades_sdk.auth``).
    Deployments may optionally enable **programmatic header-based credentials** (for example bearer tokens);
    use ``HeaderAuth`` when your tenant documents supported headers.

    Until bearer issuance is broadly documented per tenant, integrators typically reuse browser session flows or
    automation-friendly cookie exports aligned with internal tiers.

servers:
  - url: /
    description: Origin of the Cascades deployment (e.g. https://cascades.work)

tags:
  - name: System
    description: Public API metadata (no authentication required).
  - name: Workflows
    description: Submit queued or inline workflow runs.
  - name: Runs
    description: Observe run lifecycle, logs, and task rows.
  - name: Integrations
    description: Per-user connector credentials (`integration_configs`) for workflow executors.

paths:
  /api/system/version:
    get:
      tags: [System]
      operationId: getPublicApiVersion
      summary: Public HTTP API major version
      description: |
        Machine-readable API revision label for SDK negotiators and parity checks.
        Compare with deployment ``GET /openapi.json`` for full operation lists.
      responses:
        "200":
          description: API version identifier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiVersionResponse"

  /api/workflows/run:
    post:
      tags: [Workflows]
      operationId: submitWorkflowRun
      summary: Submit a workflow run (catalog id optional)
      description: |
        Validates the requested workflow definition (bundled catalog entry or caller-owned persisted row),
        persists `workflow_run` and `task_run` rows, then enqueues BullMQ work or executes inline when permitted
        by `ENV_TIER` and Redis availability. Optional JSON body `{ "workflowId": "<catalog-id>" }`; omit for the demo DAG.
        Unknown catalog ids respond with **404**. Unknown body keys respond with **400**.
      security:
        - cookieSession: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkflowRunRequestBody"
      responses:
        "200":
          description: Run accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowRunAccepted"
        "400":
          description: Workflow validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowValidationError"
        "401":
          description: Unauthenticated caller
        "404":
          description: Unknown catalog workflow id or not permitted for this user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowNotFound"
        "503":
          description: Worker queue unavailable for this tier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowEngineUnavailable"

  /api/workflows/clone:
    post:
      tags: [Workflows]
      operationId: cloneCatalogWorkflow
      summary: Clone a catalog workflow into a caller-owned persisted definition
      description: |
        Resolves ``catalogItemId`` the same way as ``POST /api/workflows/run``, copies the DAG into a new ``workflows`` row,
        and assigns a fresh definition ``id`` so edits never mutate bundled presets.
      security:
        - cookieSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkflowCloneRequest"
      responses:
        "200":
          description: Clone persisted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowCloneResponse"
        "400":
          description: Invalid JSON body or graph validation failure
        "401":
          description: Unauthenticated caller
        "404":
          description: Unknown catalog workflow id or not permitted for this user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowNotFound"

  /api/runs/{id}/stream:
    get:
      tags: [Runs]
      operationId: streamRunTelemetry
      summary: SSE stream for status polling and log retrieval
      description: |
        Server-Sent Events (`text/event-stream`). Each frame uses a fixed SSE event name (`telemetry`);
        the **JSON body is always** a ``RunStreamEvent`` object with ``type`` (string) and ``data`` (object).

        Query parameters:
        - `since` — ISO8601 cursor into `execution_log` for incremental logs.
        - `taskSince` — ISO8601 cursor for `task_run` row updates.

        Standard ``type`` values (lifecycle):

        - ``run.started`` — initial run snapshot for this connection.
        - ``run.progress`` — subsequent run row snapshots (status / completion).
        - ``run.completed`` — terminal success (closes stream server-side).
        - ``run.failed`` — terminal failure (closes stream server-side).

        Auxiliary kinds (same envelope):

        - ``log.entry`` — execution log rows.
        - ``task.update`` — task_run row updates.
        - ``stream.error`` — polling / transport errors on the server side.
      security:
        - cookieSession: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Workflow run identifier
        - name: since
          in: query
          required: false
          schema:
            type: string
          description: ISO8601 cursor for `execution_log`
        - name: taskSince
          in: query
          required: false
          schema:
            type: string
          description: ISO8601 cursor for `task_run`
      responses:
        "200":
          description: |
            SSE stream. Frames named ``telemetry``; parse each ``data`` line as ``RunStreamEvent``.
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/RunStreamEvent"
        "401":
          description: Unauthenticated caller
        "404":
          description: Run missing or forbidden for this user

  /api/integrations/github:
    post:
      summary: Save or update GitHub integration (PAT or secret reference)
      description: |
        Stores a GitHub credential for the current user: either a PAT in `integration_configs`, or a
        `secretKey` referencing the unified `secrets` table. Used by github workflow nodes.

        **Credential handling:** Inline tokens live in `integration_configs`. Secret-backed configs store only
        the key name; the PAT is decrypted at execution time. The raw token is never returned (responses may
        include `tokenLastFour` only).

        Provide **exactly one** of `token` or `secretKey`. Malformed JSON request bodies respond with **400**
        and `error: "invalid_token"`. If `secretKey` is unknown for this user, **400** with `unknown_secret_key`.
      operationId: saveGithubIntegration
      tags: [Integrations]
      security:
        - cookieSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GithubIntegrationSaveRequest"
      responses:
        "200":
          description: Integration saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GithubIntegrationSaved"
        "400":
          description: Invalid input (token or repository)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GithubIntegrationSaveError"
        "401":
          description: Not authenticated
        "500":
          description: Server error

  /api/integrations/gitlab:
    post:
      summary: Save or update GitLab integration (PAT or secret reference)
      description: |
        Stores a GitLab credential for the current user: either a PAT in `integration_configs`, or a
        `secretKey` referencing the unified `secrets` table. Used by gitlab workflow nodes (GitLab.com API v4; PAT only).

        **Credential handling:** Same model as GitHub — inline PAT in config or `secretKey` resolved at run time.

        Provide **exactly one** of `token` or `secretKey`. Optional `defaultProject` is `namespace/project` for nodes
        that use the `__default__` project sentinel.
      operationId: saveGitlabIntegration
      tags: [Integrations]
      security:
        - cookieSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GitlabIntegrationSaveRequest"
      responses:
        "200":
          description: Integration saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GitlabIntegrationSaved"
        "400":
          description: Invalid input (token or project path)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GitlabIntegrationSaveError"
        "401":
          description: Not authenticated
        "500":
          description: Server error

  /api/integrations/jira:
    post:
      summary: Save or update Jira Cloud integration
      description: |
        Stores `baseUrl`, `email`, and either inline `apiToken` or `secretKey` (PAT in secrets). Basic auth to Jira REST v3. No OAuth.
      operationId: saveJiraIntegration
      tags: [Integrations]
      security:
        - cookieSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JiraIntegrationSaveRequest"
      responses:
        "200":
          description: Integration saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JiraIntegrationSaved"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JiraIntegrationSaveError"
        "401":
          description: Not authenticated
        "500":
          description: Server error

  /api/integrations/servicenow:
    post:
      summary: Save or update ServiceNow integration
      description: |
        Stores `instanceUrl`, `username`, and either inline `password` or `secretKey`. Basic auth to Table API. No OAuth.
      operationId: saveServicenowIntegration
      tags: [Integrations]
      security:
        - cookieSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServicenowIntegrationSaveRequest"
      responses:
        "200":
          description: Integration saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServicenowIntegrationSaved"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServicenowIntegrationSaveError"
        "401":
          description: Not authenticated
        "500":
          description: Server error

  /api/integrations/slack:
    post:
      summary: Save or update Slack incoming webhook
      description: |
        Stores an incoming webhook URL for Slack workflow nodes: paste `webhookUrl`, or store the URL in unified secrets and reference `webhookSecretKey`. Exactly one of the two is required.
      operationId: saveSlackIntegration
      tags: [Integrations]
      security:
        - cookieSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SlackIntegrationSaveRequest"
      responses:
        "200":
          description: Integration saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SlackIntegrationSaved"
        "400":
          description: Invalid webhook URL, unknown secret key, or encryption not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SlackIntegrationSaveError"
        "401":
          description: Not authenticated
        "500":
          description: Server error

  /api/integrations/pagerduty:
    post:
      summary: Save or update PagerDuty integration
      description: |
        Stores Events API v2 `routingKey` or `secretKey` (secret value must be the routing key only).
        No email integrations, webhooks, or REST API keys for incident triggering.
      operationId: savePagerdutyIntegration
      tags: [Integrations]
      security:
        - cookieSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PagerdutyIntegrationSaveRequest"
      responses:
        "200":
          description: Integration saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagerdutyIntegrationSaved"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagerdutyIntegrationSaveError"
        "401":
          description: Not authenticated
        "500":
          description: Server error

  /api/integrations/hubspot:
    post:
      summary: Save or update HubSpot integration
      description: Private app token inline or via unified secrets secretKey.
      operationId: saveHubspotIntegration
      tags: [Integrations]
      security:
        - cookieSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HubspotIntegrationSaveRequest"
      responses:
        "200":
          description: Integration saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HubspotIntegrationSaved"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HubspotIntegrationSaveError"
        "401":
          description: Not authenticated
        "500":
          description: Server error

  /api/integrations/hubspot/test:
    post:
      summary: Test HubSpot CRM API connectivity
      operationId: testHubspotIntegration
      tags: [Integrations]
      security:
        - cookieSession: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationTestOk"
        "400":
          description: Not configured or missing token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HubspotVercelIntegrationTestError"
        "401":
          description: Not authenticated
        "502":
          description: HubSpot API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HubspotVercelIntegrationTestError"

  /api/integrations/salesforce:
    post:
      summary: Save or update Salesforce integration
      description: Username-password OAuth (Connected App). Password inline or secretKey.
      operationId: saveSalesforceIntegration
      tags: [Integrations]
      security:
        - cookieSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SalesforceIntegrationSaveRequest"
      responses:
        "200":
          description: Integration saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesforceIntegrationSaved"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesforceIntegrationSaveError"
        "401":
          description: Not authenticated
        "500":
          description: Server error

  /api/integrations/salesforce/test:
    post:
      summary: Test Salesforce REST API connectivity
      operationId: testSalesforceIntegration
      tags: [Integrations]
      security:
        - cookieSession: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationTestOk"
        "400":
          description: Not configured or missing credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesforceIntegrationTestError"
        "401":
          description: Not authenticated
        "502":
          description: Salesforce API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesforceIntegrationTestError"

  /api/integrations/vercel:
    post:
      summary: Save or update Vercel integration
      description: API bearer token inline or via unified secrets secretKey.
      operationId: saveVercelIntegration
      tags: [Integrations]
      security:
        - cookieSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VercelIntegrationSaveRequest"
      responses:
        "200":
          description: Integration saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VercelIntegrationSaved"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VercelIntegrationSaveError"
        "401":
          description: Not authenticated
        "500":
          description: Server error

  /api/integrations/vercel/test:
    post:
      summary: Test Vercel API connectivity
      operationId: testVercelIntegration
      tags: [Integrations]
      security:
        - cookieSession: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationTestOk"
        "400":
          description: Not configured or missing token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HubspotVercelIntegrationTestError"
        "401":
          description: Not authenticated
        "502":
          description: Vercel API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HubspotVercelIntegrationTestError"

components:
  securitySchemes:
    cookieSession:
      type: apiKey
      in: cookie
      name: __session
      description: Auth0 session cookie (exact name may vary per deployment).

  schemas:
    GithubIntegrationSaveRequest:
      oneOf:
        - type: object
          required: [token]
          properties:
            token:
              type: string
              description: GitHub Personal Access Token (never echoed in responses).
              minLength: 20
              maxLength: 512
            defaultRepository:
              type: string
              description: >-
                Default repository as owner/repo (for workflow nodes that set repository to the __default__ sentinel).
              pattern: '^[^/\s]+/[^/\s]+$'
        - type: object
          required: [secretKey]
          properties:
            secretKey:
              type: string
              description: Unified secrets key (Dashboard → Secrets); PAT resolved at execution time.
              minLength: 1
              maxLength: 128
            defaultRepository:
              type: string
              description: >-
                Default repository as owner/repo (for workflow nodes that set repository to the __default__ sentinel).
              pattern: '^[^/\s]+/[^/\s]+$'

    GithubIntegrationSaved:
      type: object
      required: [ok, id, provider]
      properties:
        ok:
          type: boolean
          example: true
        id:
          type: string
          description: integration_configs row identifier
        provider:
          type: string
          enum: [github]
        tokenLastFour:
          type: string
          description: Last four characters of the stored token for UI confirmation only.
        defaultRepository:
          type: string
          description: Echo of the persisted default repository when provided.

    GithubIntegrationSaveError:
      type: object
      required: [error]
      properties:
        error:
          type: string
          enum: [invalid_token, invalid_repository, unknown_secret_key]
          description: |
            `invalid_token` — malformed body, or neither/both of `token` and `secretKey`.
            `invalid_repository` — `defaultRepository` not in owner/repo form.
            `unknown_secret_key` — `secretKey` not found for this user.

    GitlabIntegrationSaveRequest:
      oneOf:
        - type: object
          required: [token]
          properties:
            token:
              type: string
              description: GitLab Personal Access Token (never echoed in responses).
              minLength: 20
              maxLength: 512
            defaultProject:
              type: string
              description: >-
                Default project path namespace/project (nested groups allowed), for nodes using the __default__ sentinel.
              pattern: '^[a-zA-Z0-9_.-]+(?:/[a-zA-Z0-9_.-]+)+$'
        - type: object
          required: [secretKey]
          properties:
            secretKey:
              type: string
              description: Unified secrets key (Dashboard → Secrets); PAT resolved at execution time.
              minLength: 1
              maxLength: 128
            defaultProject:
              type: string
              description: >-
                Default project path namespace/project (nested groups allowed), for nodes using the __default__ sentinel.
              pattern: '^[a-zA-Z0-9_.-]+(?:/[a-zA-Z0-9_.-]+)+$'

    GitlabIntegrationSaved:
      type: object
      required: [ok, id, provider]
      properties:
        ok:
          type: boolean
          example: true
        id:
          type: string
          description: integration_configs row identifier
        provider:
          type: string
          enum: [gitlab]
        tokenLastFour:
          type: string
          description: Last four characters of the stored token for UI confirmation only.
        defaultProject:
          type: string
          description: Echo of the persisted default project when provided.

    GitlabIntegrationSaveError:
      type: object
      required: [error]
      properties:
        error:
          type: string
          enum: [invalid_token, invalid_project, unknown_secret_key]
          description: |
            `invalid_token` — malformed body, or neither/both of `token` and `secretKey`.
            `invalid_project` — `defaultProject` not a valid namespace/project path.
            `unknown_secret_key` — `secretKey` not found for this user.

    JiraIntegrationSaveRequest:
      oneOf:
        - type: object
          required: [apiToken, baseUrl, email]
          properties:
            apiToken:
              type: string
              minLength: 8
              maxLength: 512
            baseUrl:
              type: string
              format: uri
              description: Jira Cloud site root (https).
            email:
              type: string
              format: email
        - type: object
          required: [secretKey, baseUrl, email]
          properties:
            secretKey:
              type: string
              minLength: 1
              maxLength: 128
            baseUrl:
              type: string
              format: uri
            email:
              type: string
              format: email

    JiraIntegrationSaved:
      type: object
      required: [ok, id, provider]
      properties:
        ok:
          type: boolean
          example: true
        id:
          type: string
        provider:
          type: string
          enum: [jira]
        tokenLastFour:
          type: string

    JiraIntegrationSaveError:
      type: object
      required: [error]
      properties:
        error:
          type: string
          enum: [invalid_token, invalid_body, unknown_secret_key]

    ServicenowIntegrationSaveRequest:
      oneOf:
        - type: object
          required: [password, instanceUrl, username]
          properties:
            password:
              type: string
              minLength: 1
              maxLength: 512
            instanceUrl:
              type: string
              description: https://*.service-now.com
            username:
              type: string
        - type: object
          required: [secretKey, instanceUrl, username]
          properties:
            secretKey:
              type: string
              minLength: 1
              maxLength: 128
            instanceUrl:
              type: string
            username:
              type: string

    ServicenowIntegrationSaved:
      type: object
      required: [ok, id, provider]
      properties:
        ok:
          type: boolean
          example: true
        id:
          type: string
        provider:
          type: string
          enum: [servicenow]
        passwordLastFour:
          type: string

    ServicenowIntegrationSaveError:
      type: object
      required: [error]
      properties:
        error:
          type: string
          enum: [invalid_token, invalid_body, unknown_secret_key]

    SlackIntegrationSaveRequest:
      oneOf:
        - type: object
          required: [webhookUrl]
          additionalProperties: false
          properties:
            webhookUrl:
              type: string
              minLength: 24
              maxLength: 2048
              description: Slack incoming webhook URL (https://hooks.slack.com/services/...).
        - type: object
          required: [webhookSecretKey]
          additionalProperties: false
          properties:
            webhookSecretKey:
              type: string
              minLength: 1
              maxLength: 128
              description: Unified secrets key whose value is the incoming webhook URL.

    SlackIntegrationSaved:
      type: object
      required: [ok, id, provider]
      properties:
        ok:
          type: boolean
          example: true
        id:
          type: string
        provider:
          type: string
          enum: [slack]

    SlackIntegrationSaveError:
      type: object
      required: [error]
      properties:
        error:
          type: string
          enum: [invalid_webhook, unknown_webhook_secret_key]

    PagerdutyIntegrationSaveRequest:
      oneOf:
        - type: object
          required: [routingKey]
          additionalProperties: false
          properties:
            routingKey:
              type: string
              minLength: 10
              maxLength: 512
              description: Events API v2 integration routing key (paste).
        - type: object
          required: [secretKey]
          additionalProperties: false
          properties:
            secretKey:
              type: string
              minLength: 1
              maxLength: 128
              description: Unified secrets key; value must be the routing key only.

    PagerdutyIntegrationSaved:
      type: object
      required: [ok, id, provider]
      properties:
        ok:
          type: boolean
          example: true
        id:
          type: string
        provider:
          type: string
          enum: [pagerduty]
        routingKeyLastFour:
          type: string

    PagerdutyIntegrationSaveError:
      type: object
      required: [error]
      properties:
        error:
          type: string
          enum: [invalid_routing_key, unknown_secret_key]

    IntegrationTestOk:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
          enum: [true]

    HubspotVercelIntegrationTestError:
      type: object
      required: [error]
      properties:
        error:
          type: string
          enum: [not_configured, missing_token, provider_api_error]
        status:
          type: integer
        detail:
          type: string

    SalesforceIntegrationTestError:
      type: object
      required: [error]
      properties:
        error:
          type: string
          enum: [not_configured, missing_credentials, provider_api_error]
        status:
          type: integer
        detail:
          type: string

